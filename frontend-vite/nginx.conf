user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

include /usr/share/nginx/modules/*.conf;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    # Ensure proper MIME types for HLS
    types {
        application/vnd.apple.mpegURL m3u8;
        video/MP2T ts;
    }
    # Map Upgrade header to a proper Connection value for WebSocket upgrades
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';
    access_log  /var/log/nginx/access.log  main;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen 80;
        server_name ${DOMAIN};

        client_max_body_size 350M;  # Aumentado para payloads base64 de imagen/video AI

        # CSP ultra flexible (igual que tu ejemplo, solo reemplaza el dominio)
        add_header Content-Security-Policy "
            default-src 'self' https://wallet.web3auth.io https://accounts.google.com https://apis.google.com;
            connect-src
                'self'
                ws://localhost:5173
                ws://127.0.0.1:5173
                wss://${DOMAIN}
                https://${DOMAIN}
                https://*.polygon.technology
                https://rpc-amoy.polygon.technology
                https://*.web3auth.io
                https://api.web3auth.io
                https://auth.web3auth.io
                https://api.openlogin.com
                https://sdk.openlogin.com
                https://*.openlogin.com
                https://wallet.web3auth.io
                https://develop-nft-checkout.web3auth.io
                https://cdn.segment.com
                https://api.segment.io
                https://sentry.hcaptcha.com
                https://newassets.hcaptcha.com
                https://client.crisp.chat
                https://www.googletagmanager.com
                https://browser.sentry-cdn.com
                https://js.sentry-cdn.com
                https://js.hcaptcha.com
                https://*.hcaptcha.com
                https://accounts.google.com
                https://apis.google.com
                https://oauth2.googleapis.com
                https://www.googleapis.com
                https://*.googleusercontent.com
                https://ssl.gstatic.com
                https://metamask-sdk.api.cx.metamask.io
                https://mm-sdk-analytics.api.cx.metamask.io
                https://wallet.web3auth.io
                https://develop-nft-checkout.web3auth.io
                wss://metamask-sdk.api.cx.metamask.io
                wss://session.web3auth.io
                https://wallet.web3auth.io
                https://auth.privy.io
                https://explorer-api.walletconnect.com
                https://pulse.walletconnect.org
                https://api.web3modal.org
                blob:;
            script-src
                'self'
                https://client.crisp.chat
                https://www.googletagmanager.com
                https://browser.sentry-cdn.com
                https://js.sentry-cdn.com
                https://hcaptcha.com
                https://*.hcaptcha.com
                https://*.web3auth.io
                https://auth.web3auth.io
                https://sdk.openlogin.com
                https://cdn.segment.com
                https://js.hcaptcha.com
                https://accounts.google.com
                https://apis.google.com
                https://ssl.gstatic.com
                blob:;
            style-src
                'self'
                'unsafe-inline'
                https://fonts.googleapis.com;
            font-src
                'self'
                https://fonts.gstatic.com
                https://ssl.gstatic.com;
            img-src
                'self'
                data:
                blob:
                https://*.web3auth.io
                https://${DOMAIN}
                https://*.polygon.technology
                https://cdn.segment.com
                https://client.crisp.chat
                https://ssl.gstatic.com
                https://*.googleusercontent.com
                https://*.r2.cloudflarestorage.com
                https://*.r2.dev
                ${R2_CDN_BASE};
            frame-src
                'self'
                https://*.web3auth.io
                https://wallet.web3auth.io
                https://develop-nft-checkout.web3auth.io
                https://*.openlogin.com
                https://*.hcaptcha.com
                https://accounts.google.com
                https://*.googleusercontent.com;
            frame-ancestors 'self';
        ";

        # Servir build estático de Vite
        location / {
            add_header Cross-Origin-Resource-Policy "cross-origin";
            root /usr/share/nginx/html;
            try_files $uri $uri/ /index.html;
        }

        # Proxy para API backend (incluye soporte WebSocket)
        location /api/ {
            add_header Cross-Origin-Resource-Policy "cross-origin";
            proxy_http_version 1.1;
            proxy_pass http://backend:${BACKEND_PORT};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            # Timeouts y buffering para WS long-lived
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_buffering off;
        }

        # Proxy extendido para AI Imagen/Video (Aurora puede tardar hasta 180s)
        location /api/carta/ai-imagen/ {
            add_header Cross-Origin-Resource-Policy "cross-origin";
            proxy_http_version 1.1;
            proxy_pass http://backend:${BACKEND_PORT};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Timeouts extendidos — generacion de imagen/video puede tardar 2-3 min
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            proxy_connect_timeout 10s;
            proxy_buffering off;
            client_max_body_size 50M;  # Para imagenes de referencia base64
        }

        # Proxy para HLS streams hacia el backend FastAPI
        location /streams/ {
            add_header Cross-Origin-Resource-Policy "cross-origin";
            proxy_pass http://backend:${BACKEND_PORT};
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}